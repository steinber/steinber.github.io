<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Steinberg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #2c2c2c;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            display: flex;
            gap: 4rem;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        .left {
            flex-shrink: 0;
            text-align: center;
        }

        .photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            background: #e0e0e0;
        }

        .name {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .contact {
            margin-top: 0.4rem;
            font-size: 0.85rem;
        }

        .contact a {
            color: #555;
            text-decoration: none;
        }

        .contact a:hover {
            color: #000;
            text-decoration: underline;
        }
      .right {
            flex: 1;
        }

        .right h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
        }

        .project {
            margin-bottom: 1.5rem;
        }

        .project h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .project h3 a {
            color: #2c2c2c;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }

        .project h3 a:hover {
            border-bottom-color: #2c2c2c;
        }

        .project p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        @media (max-width: 640px) {
            .container {
                flex-direction: column;
                align-items: center;
                gap: 2rem;
            }

            .right {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <!-- Replace "photo.jpg" with your actual photo file -->
            <img src="photo.jpg" alt="Peter Steinberg" class="photo">
            <div class="name">Peter Steinberg</div>
            <div class="contact"><a href="mailto:steinber@gmail.com">steinber@gmail.com</a></div>
        </div>
        <div class="right">
            <h2>Projects</h2>
            <div class="project">
                <h3><a href="https://github.com/steinber/spread">spread</a></h3>
                <p>A stochastic sequencer for norns</p>
            </div>
            <div class="project">
                <h3><a href="https://github.com/steinber/ripples">ripples</a></h3>
                <p>A modulator/sequencer based on interfering radial waves</p>
            </div>
            <div class="project">
                <h3>byte beat</h3>
                <p>A new byte beat synthesizer for iOS — coming soon</p>
            </div>
        </div>
    </div>
</body>
</html>
